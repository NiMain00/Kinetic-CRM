version: '3.9'

services:

  nginx:
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ../frontend:/app
      - /app/node_modules
    environment:
      VITE_API_BASE_URL: http://localhost:4000

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile.dev
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    volumes:
      - ../backend:/app
      - /app/node_modules
    environment:
      NODE_ENV: development
      LOG_LEVEL: debug
    command: ["npx", "tsx", "watch", "src/index.ts"]

  mysql:
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    ports:
      - "${REDIS_PORT:-6379}:6379"

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  storage_volume:
    driver: local
