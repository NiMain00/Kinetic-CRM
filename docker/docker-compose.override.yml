version: '3.9'

services:

  nginx:
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ../frontend:/app
      - /app/node_modules
    environment:
      VITE_API_BASE_URL: http://localhost:4000/api/v1
      CHOKIDAR_USEPOLLING: '1'
      VITE_HMR_HOST: localhost
      VITE_HMR_PORT: '3000'

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile.dev
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    volumes:
      - ../backend:/app
      - ../prisma:/app/prisma:cached
      - /app/node_modules
    environment:
      NODE_ENV: development
      LOG_LEVEL: debug
      DATABASE_URL: mysql://kinetic_user:secret@mysql:3306/kinetic_crm

  mysql:
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  scheduler:
    profiles: ["disabled"]

  redis:
    ports:
      - "${REDIS_PORT:-6379}:6379"

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  storage_volume:
    driver: local
