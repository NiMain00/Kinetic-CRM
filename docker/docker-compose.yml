version: '3.9'

services:

  nginx:
    image: nginx:1.25-alpine
    container_name: kinetic_nginx
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - storage_volume:/var/www/storage:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - kinetic_net

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost:4000}
        - VITE_APP_VERSION=${APP_VERSION:-1.0.0}
    container_name: kinetic_frontend
    expose:
      - "3000"
    restart: unless-stopped
    networks:
      - kinetic_net

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: kinetic_backend
    expose:
      - "4000"
    environment:
      NODE_ENV: ${APP_ENV:-production}
      PORT: 4000
      FRONTEND_URL: ${APP_URL:-http://localhost:3000}

      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-kinetic_crm}
      DB_USERNAME: ${DB_USERNAME:-kinetic_user}
      DB_PASSWORD: ${DB_PASSWORD}
      DATABASE_URL: mysql://${DB_USERNAME:-kinetic_user}:${DB_PASSWORD}@mysql:3306/${DB_DATABASE:-kinetic_crm}

      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}

      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY_HOURS: ${JWT_EXPIRY_HOURS:-8}

      SESSION_WARN_MINUTES: ${SESSION_WARN_MINUTES:-25}

      STORAGE_ROOT: /app/uploads
      STORAGE_MAX_UPLOAD_MB: ${STORAGE_MAX_UPLOAD_MB:-25}

      AI_PROVIDER: ${AI_PROVIDER:-gemini}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      AI_MODEL: ${AI_MODEL:-gemini-2.5-pro}
      AI_EMBEDDING_MODEL: ${AI_EMBEDDING_MODEL:-text-embedding-004}
      AI_MAX_TOKENS: ${AI_MAX_TOKENS:-2048}
      AI_TEMPERATURE: ${AI_TEMPERATURE:-0.3}
      AI_TIMEOUT_SECONDS: ${AI_TIMEOUT_SECONDS:-30}
      AI_MAX_RETRIES: ${AI_MAX_RETRIES:-3}
      AI_RATE_LIMIT_RPM: ${AI_RATE_LIMIT_RPM:-60}
      AI_COST_LIMIT_USD_PER_DAY: ${AI_COST_LIMIT_USD_PER_DAY:-10.0}
      AI_ENABLED: ${AI_ENABLED:-true}

      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-KINETIC CRM}
      SMTP_ENCRYPTION: ${SMTP_ENCRYPTION:-tls}

      LOG_LEVEL: ${LOG_LEVEL:-error}
    volumes:
      - storage_volume:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - kinetic_net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  scheduler:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: kinetic_scheduler
    command: ["node", "dist/scheduler.js"]
    environment:
      NODE_ENV: ${APP_ENV:-production}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-kinetic_crm}
      DB_USERNAME: ${DB_USERNAME:-kinetic_user}
      DB_PASSWORD: ${DB_PASSWORD}
      DATABASE_URL: mysql://${DB_USERNAME:-kinetic_user}:${DB_PASSWORD}@mysql:3306/${DB_DATABASE:-kinetic_crm}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      AI_PROVIDER: ${AI_PROVIDER:-gemini}
      STORAGE_ROOT: /app/uploads
    volumes:
      - storage_volume:/app/uploads
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - kinetic_net

  mysql:
    image: mysql:8.0
    container_name: kinetic_mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${DB_DATABASE:-kinetic_crm}
      MYSQL_USER: ${DB_USERNAME:-kinetic_user}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
    expose:
      - "3306"
    restart: unless-stopped
    networks:
      - kinetic_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u${DB_USERNAME:-kinetic_user}", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: kinetic_redis
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    restart: unless-stopped
    networks:
      - kinetic_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  storage_volume:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${STORAGE_HOST_PATH:-./storage}

networks:
  kinetic_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
