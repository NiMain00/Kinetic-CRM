<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kinetic CRM - Enterprise Operations</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Google Fonts & Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        display: inline-block;
        line-height: 1;
        text-transform: none;
        letter-spacing: normal;
        word-wrap: normal;
        white-space: nowrap;
        direction: ltr;
      }
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: var(--color-surface-dim); }
      ::-webkit-scrollbar-thumb { background: var(--color-outline); border-radius: 10px; }
      ::-webkit-scrollbar-thumb:hover { background: var(--color-on-surface-variant); }
    </style>
  </head>
  <body class="bg-background text-on-surface font-body-main selection:bg-primary-fixed selection:text-on-primary-fixed">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
