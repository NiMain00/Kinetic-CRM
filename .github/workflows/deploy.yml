name: Deploy KINETIC CRM

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run backend tests
        run: |
          cd backend
          npm ci
          npm run build
      - name: Run frontend tests
        run: |
          cd frontend
          npm ci
          npm run build

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ghcr.io/${{ github.repository }}/backend:${{ github.sha }}
      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy to production server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/kinetic-crm
            export IMAGE_TAG=${{ github.sha }}
            docker-compose -f docker/docker-compose.yml pull
            docker-compose -f docker/docker-compose.yml up -d --no-deps --build
            docker-compose -f docker/docker-compose.yml exec -T backend npx prisma migrate deploy
            curl -f http://localhost/health || exit 1
</write_to_file>

<task_progress>
- [x] Phase 1: Create .env file
- [x] Phase 1: Create MySQL init SQL
- [x] Phase 1: Implement GET /health endpoint
- [x] Phase 2: Create backup scripts
- [x] Phase 2: Create CI/CD pipeline
- [ ] Phase 3: Verify docker-compose up
</task_progress>
</write_to_file>